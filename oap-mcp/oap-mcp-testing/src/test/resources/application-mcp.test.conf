boot.main = oap-mcp-testing-test

services {
  oap-http.oap-http-server.parameters {
    defaultPort.httpPort = ${TEST_HTTP_PORT}
    additionalHttpPorts.httpprivate = ${TEST_HTTP_PORT}
  }

  oap-ws.session-manager.parameters.cookieDomain = ""

  oap-mcp {
    mcp-service.parameters {
      name = oap-test-mcp
      version = "1.0"
    }
    mcp-settings-ws.ws-service.interceptors = <modules.oap-mcp-testing-test.test-api-key-interceptor>
  }
}
